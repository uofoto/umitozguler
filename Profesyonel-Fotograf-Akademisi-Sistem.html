<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Profesyonel Fotoğraf Akademisi</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.4.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@3.0.0"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<style>
body { background: #111; color: #eee; font-family: Arial, sans-serif; text-align:center; margin:0; }
#container { max-width:90%; margin:20px auto; }
canvas { border:1px solid #333; margin-top:10px; }
#results { margin-top:20px; text-align:left; background:#222; padding:15px; border-radius:5px; }
button { padding:10px 20px; margin-top:10px; font-size:16px; cursor:pointer; }
input[type=file] { margin-top:10px; }
</style>
</head>
<body>
<div id="container">
  <h1>Profesyonel Fotoğraf Akademisi</h1>
  <input type="file" id="fileInput" accept="image/*">
  <br>
  <button id="analyzeBtn">Fotoğrafı Analiz Et</button>
  <canvas id="photoCanvas"></canvas>
  <div id="results">Analiz sonuçları buraya gelecek...</div>
</div>

<script>
let canvas = document.getElementById('photoCanvas');
let ctx = canvas.getContext('2d');
let img = new Image();
let mobilenetModel = null;
let maxWidth = 1024; // performans için maksimum genişlik
let maxHeight = 1024; // performans için maksimum yükseklik

// Fotoğraf yükleme
document.getElementById('fileInput').addEventListener('change', (e) => {
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = function(event) {
        img.onload = function() {
            // Boyut sınırlama
            let scale = Math.min(maxWidth/img.width, maxHeight/img.height, 1);
            canvas.width = img.width*scale;
            canvas.height = img.height*scale;
            ctx.drawImage(img,0,0,canvas.width,canvas.height);
        }
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
});

// TensorFlow modeli yükleme
async function loadModel() {
    mobilenetModel = await mobilenet.load();
}

// Analiz fonksiyonu
async function analyzePhoto() {
    if(!img.src) { alert('Fotoğraf yükleyin!'); return; }
    document.getElementById('results').innerHTML = 'Analiz başlatılıyor...';
    
    // 1. TensorFlow sınıflandırma
    const tfImg = tf.browser.fromPixels(canvas);
    const predictions = await mobilenetModel.classify(tfImg);
    tfImg.dispose();
    
    // 2. Altın oran ve görsel ağırlık merkezi overlay
    drawGoldenRatio();
    drawVisualCenter();
    
    // 3. Histogram
    let histogramHTML = generateHistogram();
    
    // 4. EXIF analizi
    EXIF.getData(img, function() {
        const iso = EXIF.getTag(this,'ISOSpeedRatings') || 'Bilinmiyor';
        const f = EXIF.getTag(this,'FNumber') || 'Bilinmiyor';
        const exposure = EXIF.getTag(this,'ExposureTime') || 'Bilinmiyor';
        const lens = EXIF.getTag(this,'LensModel') || 'Bilinmiyor';
        document.getElementById('results').innerHTML = `
        <h3>📊 AI Analizi</h3>
        <b>Mobilenet Tahminleri:</b> ${predictions.map(p => `${p.className} (${(p.probability*100).toFixed(1)}%)`).join(', ')}<br>
        <b>EXIF:</b> ISO: ${iso}, Diyafram: ${f}, Pozlama: ${exposure}, Lens: ${lens}<br>
        ${histogramHTML}
        <h3>🎨 AI Küratör Yorumu</h3>
        ${generateAICuratorComment(predictions)}
        `;
    });
}

// Altın oran çizgileri
function drawGoldenRatio() {
    let w = canvas.width, h = canvas.height;
    let phi = 0.618;
    ctx.strokeStyle = 'rgba(255,0,0,0.6)';
    ctx.lineWidth = 2;
    // dikey
    ctx.beginPath();
    ctx.moveTo(w*phi,0); ctx.lineTo(w*phi,h); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w*(1-phi),0); ctx.lineTo(w*(1-phi),h); ctx.stroke();
    // yatay
    ctx.beginPath();
    ctx.moveTo(0,h*phi); ctx.lineTo(w,h*phi); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0,h*(1-phi)); ctx.lineTo(w,h*(1-phi)); ctx.stroke();
}

// Görsel ağırlık merkezi (basit parlaklık ağırlıklı)
function drawVisualCenter() {
    let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
    let totalX=0, totalY=0, totalL=0;
    for(let i=0;i<imgData.data.length;i+=4){
        let r=imgData.data[i], g=imgData.data[i+1], b=imgData.data[i+2];
        let lum = 0.299*r + 0.587*g + 0.114*b;
        let x = ((i/4)%canvas.width);
        let y = Math.floor((i/4)/canvas.width);
        totalX += x*lum; totalY += y*lum; totalL += lum;
    }
    let cx = totalX/totalL;
    let cy = totalY/totalL;
    ctx.fillStyle = 'rgba(0,255,255,0.7)';
    ctx.beginPath(); ctx.arc(cx,cy,10,0,2*Math.PI); ctx.fill();
}

// Basit histogram
function generateHistogram() {
    let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
    let hist = new Array(256).fill(0);
    for(let i=0;i<imgData.data.length;i+=4){
        let lum = Math.floor(0.299*imgData.data[i]+0.587*imgData.data[i+1]+0.114*imgData.data[i+2]);
        hist[lum]++;
    }
    let histCanvas = '<canvas width=256 height=100 style="border:1px solid #333;margin-top:5px;"></canvas>';
    setTimeout(()=>{ // küçük gecikme ile çiz
        let hc = document.querySelector('#results canvas');
        if(!hc) return;
        let hctx = hc.getContext('2d');
        hctx.fillStyle='#fff';
        let max = Math.max(...hist);
        for(let i=0;i<256;i++){
            let bar = hist[i]/max*100;
            hctx.fillRect(i,100-bar,1,bar);
        }
    },50);
    return histCanvas;
}

// AI küratör yorumu (basit örnek)
function generateAICuratorComment(predictions) {
    let top = predictions[0];
    let comment = `Bu fotoğrafın temel öğesi "${top.className}" ve estetik olarak `;
    if(top.probability>0.7) comment += 'çok güçlü bir etkiye sahip.';
    else if(top.probability>0.4) comment += 'dikkat çekici ve dengeli.';
    else comment += 'orantılı ama geliştirilebilir.';
    return comment;
}

// Buton event
document.getElementById('analyzeBtn').addEventListener('click', analyzePhoto);

// Modeli yükle
loadModel();
</script>
</body>
</html>
