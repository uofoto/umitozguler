    <script>
        let articleConfig = {
          "meta": {
            "title": "Fotoğraf Okuma No: 51",
            "location": "09 ŞUBAT 2026 | Küratör Analizi"
          },
          "content": [
            { "type": "image", "src": "../img/51.webp", "mobile": "", "exif": "Fujifilm X-T3 | 18-55mm | ƒ/9 1/60 ISO 500", "caption": "Işığın Melankolisi" },
            { "type": "heading", "value": "Kompozisyon ve Teknik Atmosfer" },
            { "type": "text", "value": "[Analiz Başlangıcı]\nGörüntüde, izleyiciyi içeri çeken güçlü bir derinlik algısı hakim." }
          ],
          "books": [
            { "title": "Görmek Üzerine", "author": "John Berger", "img": "https://i.dr.com.tr/cache/600x600-0/originals/0000000062400-1.jpg", "link": "#" }
          ],
          "related": []
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });

        window.addEventListener('scroll', () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const pb = document.getElementById("progress-bar");
            if(pb) pb.style.width = (winScroll / height * 100) + "%";
        });

        function renderArticle() {
            const container = document.getElementById('article-container');
            if (!container) return;

            let html = `
                <div class="text-center mb-16 reveal active">
                    <a href="../analizler.html" class="inline-block mb-10 text-[10px] uppercase tracking-[0.4em] text-gray-500 hover:text-brand-orange transition-colors border-b border-transparent hover:border-brand-orange pb-1">
                        ← Tüm Analizler
                    </a>
                    <h1 class="text-3xl md:text-5xl font-bold text-white mb-6 tracking-tight leading-tight">
                        ${articleConfig.meta.title}
                    </h1>
                    <div class="flex justify-center items-center text-[10px] tracking-widest uppercase text-brand-gold space-x-6">
                        <span>${articleConfig.meta.location}</span>
                    </div>
                </div>
            `;

            let textItemFound = false;

            articleConfig.content.forEach((item, i) => {
                if (item.type === 'text') {
                    const dropCapClass = (!textItemFound) ? 'drop-cap' : '';
                    let formattedValue = item.value
                        .replace(/\n/g, '<br>')
                        .replace(/\[(.*?)\]/g, '<span class="inner-title">$1</span>');
                    
                    html += `<div class="article-content reveal active"><p class="${dropCapClass}">${formattedValue}</p></div>`;
                    textItemFound = true;
                }
                else if (item.type === 'heading') {
                    html += `<div class="article-content reveal active"><h3 class="text-white">${item.value}</h3></div>`;
                }
                else if (item.type === 'quote') {
                    html += `<div class="custom-quote reveal active"><p>${item.value}</p></div>`;
                }
                else if (item.type === 'highlight') {
                    html += `<div class="highlight-box reveal active"><span class="highlight-label">Kritik Detay</span><p class="text-white italic font-light leading-relaxed m-0">${item.value}</p></div>`;
                }
                else if (item.type === 'image') {
                    const mobileSource = item.mobile ? `<source srcset="${item.mobile}" media="(max-width: 768px)">` : '';
                    let exifBlock = item.exif ? `<div class="exif-info-strip"><div class="exif-item"><span class="exif-label">TEKNİK VERİLER</span><span class="exif-val">${item.exif}</span></div></div>` : '';
                    html += `<div class="my-16 reveal active"><div class="analysis-img-container" id="img-container-${i}"><button class="analysis-toggle-btn" onclick="toggleGrid(${i})">Analiz Modu</button><div class="composition-grid" id="grid-${i}"><div class="composition-line-h" style="top: 33.33%"></div><div class="composition-line-h" style="top: 66.66%"></div><div class="composition-line-v" style="left: 33.33%"></div><div class="composition-line-v" style="left: 66.66%"></div></div><picture>${mobileSource}<img src="${item.src || 'https://via.placeholder.com/1200x800'}" alt="${item.caption || ''}"></picture></div><div class="text-center mt-4 opacity-50 text-[10px] tracking-widest uppercase">${item.caption || ''}</div>${exifBlock}<div class="mt-14 mb-14"><div class="w-full h-[1px] bg-gradient-to-r from-transparent via-brand-gold/40 to-transparent"></div></div></div>`;
                }
                else if (item.type === 'gallery') {
                    html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-6 my-16 reveal active">`;
                    if (item.images) {
                        item.images.forEach(img => {
                            const mobileSource = img.mobile ? `<source srcset="${img.mobile}" media="(max-width: 768px)">` : '';
                            let exifBlock = img.exif ? `<div class="mt-2 text-center"><span class="text-[7px] text-brand-orange uppercase tracking-[0.2em] font-bold">TEKNİK:</span><span class="text-[8px] text-white/50 uppercase ml-1">${img.exif}</span></div>` : '';
                            html += `<div class="flex flex-col"><div class="img-container h-full shadow-lg"><picture>${mobileSource}<img src="${img.src || 'https://via.placeholder.com/600x400'}" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700"></picture></div><div class="image-caption text-[8px] mt-4 opacity-40 uppercase tracking-widest">${img.caption || ''}</div>${exifBlock}</div>`;
                        });
                    }
                    html += `</div>`;
                }
            });

            html += `<div class="mt-20 mb-8 pt-12 border-t border-white/5 text-center reveal active"><p class="text-[10px] tracking-[0.2em] uppercase text-gray-500 mb-6 font-semibold">Bu Analizi Paylaş</p><div class="flex justify-center space-x-12"><a href="javascript:void(0)" onclick="share('wa')" class="text-gray-400 hover:text-green-500 transition-colors text-[10px] uppercase tracking-widest font-bold">Whatsapp</a><a href="javascript:void(0)" onclick="share('fb')" class="text-gray-400 hover:text-blue-600 transition-colors text-[10px] uppercase tracking-widest font-bold">Facebook</a><a href="javascript:void(0)" onclick="share('x')" class="text-gray-400 hover:text-white transition-colors text-[10px] uppercase tracking-widest font-bold">Twitter</a></div></div>`;

            if (articleConfig.books && articleConfig.books.length > 0) {
                html += `<div class="reveal active"><div class="book-section-header"><h3>Tavsiye Kitaplar</h3></div><div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">`;
                articleConfig.books.forEach(book => {
                    html += `<div class="book-card"><div class="book-cover"><img src="${book.img || 'https://via.placeholder.com/150x220'}" alt="${book.title}"></div><div class="book-info"><h4>${book.title}</h4><p>${book.author}</p><a href="${book.link}" target="_blank" class="book-link">Detayları İncele →</a></div></div>`;
                });
                html += `</div></div>`;
            }

            if (articleConfig.related && articleConfig.related.length > 0) {
                html += `<div class="reveal active"><div class="related-section-header"><h3>İlginizi Çekebilir</h3></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">`;
                articleConfig.related.forEach(rel => {
                    html += `<a href="${rel.link}" class="related-card group"><div class="related-img-box"><img src="${rel.img}" alt="${rel.title}"></div><div class="p-4"><span class="related-tag">Analiz</span><h4 class="text-[0.75rem] font-medium text-white mb-2 leading-snug group-hover:text-brand-orange transition-colors duration-300 line-clamp-2">${rel.title}</h4><p class="text-[8px] text-gray-500 mb-4 line-clamp-2 leading-relaxed font-light">${rel.summary || ''}</p><div class="flex items-center"><span class="text-[7px] uppercase tracking-[0.2em] text-white/30 border-b border-white/5 pb-0.5 group-hover:border-brand-orange group-hover:text-brand-orange transition-all duration-300">İncele →</span></div></div></a>`;
                });
                html += `</div></div>`;
            }

            container.innerHTML = html;
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        function toggleGrid(i) { const grid = document.getElementById(`grid-${i}`); if(grid) grid.classList.toggle('active'); }
        function share(p) { const u = encodeURIComponent(window.location.href), t = encodeURIComponent(document.title); if(p==='wa') window.open(`https://api.whatsapp.com/send?text=${t}%20${u}`); if(p==='fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${u}`); if(p==='x') window.open(`https://twitter.com/intent/tweet?text=${t}&url=${u}`); }

        function toggleAdmin() { const panel = document.getElementById('admin-panel'); panel.classList.toggle('active'); if (panel.classList.contains('active')) renderAdminPanel(); }
        function showMsg(t) { const el = document.getElementById('custom-alert'); el.innerText = t; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 3000); }

        function renderAdminPanel() {
            document.getElementById('meta-title').value = articleConfig.meta.title;
            document.getElementById('meta-location').value = articleConfig.meta.location;
            const list = document.getElementById('item-list');
            list.innerHTML = '';
            articleConfig.content.forEach((item, i) => {
                let card = `<div class="item-card"><span class="delete-btn" onclick="deleteItem(${i})">SİL</span><label class="admin-label">${item.type.toUpperCase()}</label>`;
                
                if (item.type === 'image') {
                    card += `<input type="text" placeholder="Masaüstü Görsel Yolu" class="admin-input" value="${item.src || ''}" oninput="editItem(${i}, 'src', this.value)">
                             <input type="text" placeholder="Mobil Görsel Yolu" class="admin-input" value="${item.mobile || ''}" oninput="editItem(${i}, 'mobile', this.value)">
                             <input type="text" placeholder="EXIF Bilgisi" class="admin-input" value="${item.exif || ''}" oninput="editItem(${i}, 'exif', this.value)">
                             <input type="text" placeholder="Görsel Açıklaması" class="admin-input" value="${item.caption || ''}" oninput="editItem(${i}, 'caption', this.value)">`;
                } 
                else if (item.type === 'gallery') {
                    item.images.forEach((img, gi) => {
                        card += `<div class="p-4 bg-black/40 rounded border border-brand-orange/10 mb-4">
                                    <label class="admin-label !text-brand-orange">GÖRSEL ${gi+1}</label>
                                    <input type="text" placeholder="Masaüstü Yolu" class="admin-input" value="${img.src || ''}" oninput="editGalleryItem(${i}, ${gi}, 'src', this.value)">
                                    <input type="text" placeholder="Mobil Yolu" class="admin-input" value="${img.mobile || ''}" oninput="editGalleryItem(${i}, ${gi}, 'mobile', this.value)">
                                    <input type="text" placeholder="EXIF Bilgisi" class="admin-input" value="${img.exif || ''}" oninput="editGalleryItem(${i}, ${gi}, 'exif', this.value)">
                                    <input type="text" placeholder="Açıklama" class="admin-input !mb-0" value="${img.caption || ''}" oninput="editGalleryItem(${i}, ${gi}, 'caption', this.value)">
                                 </div>`;
                    });
                } else {
                    card += `<textarea class="admin-input h-24" oninput="editItem(${i}, 'value', this.value)">${item.value || ''}</textarea>`;
                }
                card += `</div>`;
                list.innerHTML += card;
            });
            renderBookListAdmin();
            renderRelatedListAdmin();
        }

        async function searchBooks() {
            const queryField = document.getElementById('book-search-input');
            const searchBtn = document.getElementById('book-search-btn');
            const query = queryField.value.trim();
            if(!query) return showMsg("Lütfen bir isim yazın");
            const resultsBox = document.getElementById('book-search-results');
            resultsBox.innerHTML = '<p class="text-[9px] text-gray-500 text-center py-4">Sorgulanıyor...</p>';
            searchBtn.disabled = true;
            try {
                const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=5&printType=books`;
                const response = await fetch(url);
                const data = await response.json();
                resultsBox.innerHTML = '';
                if(data.items) {
                    data.items.forEach(item => {
                        const info = item.volumeInfo;
                        const title = info.title || "Başlıksız";
                        const author = info.authors ? info.authors.join(', ') : 'Bilinmeyen Yazar';
                        let thumb = info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : 'https://via.placeholder.com/150x220';
                        resultsBox.innerHTML += `<div class="search-book-item"><img src="${thumb}"><div class="info"><h5>${title}</h5><p>${author}</p></div><button onclick="selectBook('${title.replace(/'/g, "\\'")}', '${author.replace(/'/g, "\\'")}', '${thumb}', '${info.infoLink}')" class="bg-brand-gold text-black text-[8px] font-bold px-3 py-1 rounded">EKLE</button></div>`;
                    });
                }
            } catch (err) { showMsg("Hata."); } finally { searchBtn.disabled = false; }
        }

        function selectBook(title, author, img, link) { 
            if(!articleConfig.books) articleConfig.books = [];
            articleConfig.books.push({ title, author, img, link }); 
            renderBookListAdmin(); 
            renderArticle(); 
            showMsg("Kitap Eklendi"); 
        }

        function renderBookListAdmin() {
            const list = document.getElementById('book-list-admin');
            list.innerHTML = '';
            if(!articleConfig.books) articleConfig.books = [];
            articleConfig.books.forEach((book, bi) => {
                list.innerHTML += `
                <div class="item-card bg-brand-gold/5 border-brand-gold/20 p-3 mb-2">
                    <span class="delete-btn" onclick="deleteBook(${bi})">SİL</span>
                    <input type="text" placeholder="Kitap Adı" class="admin-input !mb-1 !text-[10px]" value="${book.title}" oninput="editBook(${bi}, 'title', this.value)">
                    <input type="text" placeholder="Yazar" class="admin-input !mb-1 !text-[10px]" value="${book.author}" oninput="editBook(${bi}, 'author', this.value)">
                    <input type="text" placeholder="Kapak URL" class="admin-input !mb-1 !text-[10px]" value="${book.img}" oninput="editBook(${bi}, 'img', this.value)">
                    <input type="text" placeholder="Link" class="admin-input !mb-0 !text-[10px]" value="${book.link}" oninput="editBook(${bi}, 'link', this.value)">
                </div>`;
            });
        }

        function renderRelatedListAdmin() {
            const list = document.getElementById('related-list-admin');
            list.innerHTML = '';
            if(!articleConfig.related) articleConfig.related = [];
            articleConfig.related.forEach((rel, ri) => {
                list.innerHTML += `
                <div class="item-card bg-brand-orange/5 border-brand-orange/20 p-3 mb-2">
                    <span class="delete-btn" onclick="deleteRelated(${ri})">SİL</span>
                    <input type="text" class="admin-input !mb-1 !text-[10px]" value="${rel.title}" oninput="editRelated(${ri}, 'title', this.value)">
                    <input type="text" class="admin-input !mb-0 !text-[10px]" value="${rel.link}" oninput="editRelated(${ri}, 'link', this.value)">
                </div>`;
            });
        }

        async function autoScrapeArticle() {
            const url = document.getElementById('auto-link-input').value;
            if(!url) return showMsg("Link girin");
            showMsg("Analiz ediliyor...");
            try {
                const response = await fetch(url);
                const htmlText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                const title = doc.querySelector('h1')?.innerText || doc.title || "Analiz";
                const img = doc.querySelector('img')?.src || "../img/placeholder.webp";
                const summary = doc.querySelector('p')?.innerText.substring(0, 100) + "...";
                articleConfig.related.push({ title, link: url, img, summary });
                renderArticle(); renderAdminPanel(); showMsg("Veri Eklendi");
            } catch (err) { showMsg("Hata."); }
        }

        function editItem(i, k, v) { articleConfig.content[i][k] = v; renderArticle(); }
        function editGalleryItem(i, gi, k, v) { articleConfig.content[i].images[gi][k] = v; renderArticle(); }
        function deleteItem(i) { articleConfig.content.splice(i, 1); renderAdminPanel(); renderArticle(); }
        
        function editBook(bi, k, v) { articleConfig.books[bi][k] = v; renderArticle(); }
        function deleteBook(bi) { articleConfig.books.splice(bi, 1); renderAdminPanel(); renderArticle(); }
        function addBookManual() { if(!articleConfig.books) articleConfig.books = []; articleConfig.books.push({title: 'Yeni Kitap', author: 'Yazar', img: '', link: '#'}); renderAdminPanel(); renderArticle(); }

        function editRelated(ri, k, v) { articleConfig.related[ri][k] = v; renderArticle(); }
        function deleteRelated(ri) { articleConfig.related.splice(ri, 1); renderAdminPanel(); renderArticle(); }

        function updateMeta() { articleConfig.meta.title = document.getElementById('meta-title').value; articleConfig.meta.location = document.getElementById('meta-location').value; renderArticle(); }
        
        function addItem(type) { 
            if (type === 'image') {
                articleConfig.content.push({ type, src: '', mobile: '', exif: '', caption: '' }); 
            } else if (type === 'gallery') {
                articleConfig.content.push({type, images: [
                    {src:'', mobile:'', exif:'', caption:''},
                    {src:'', mobile:'', exif:'', caption:''},
                    {src:'', mobile:'', exif:'', caption:''}
                ]});
            } else {
                articleConfig.content.push({ type, value: '' }); 
            }
            renderAdminPanel(); renderArticle(); 
        }

        function copyCode() { navigator.clipboard.writeText("let articleConfig = " + JSON.stringify(articleConfig, null, 2) + ";").then(() => showMsg("Kopyalandı")); }
        
        window.onload = () => { 
            renderArticle(); 
            const toggle = document.getElementById('menu-toggle');
            if (toggle) {
                toggle.onclick = () => {
                    const menu = document.getElementById('mobile-menu');
                    menu.classList.toggle('active'); menu.classList.toggle('translate-x-full');
                    document.getElementById('line1').classList.toggle('rotate-45'); document.getElementById('line1').classList.toggle('translate-y-2');
                    document.getElementById('line2').classList.toggle('opacity-0');
                    document.getElementById('line3').classList.toggle('-rotate-45'); document.getElementById('line3').classList.toggle('-translate-y-2');
                };
            }
        };
        
        document.addEventListener('keydown', (e) => { if (e.shiftKey && e.altKey && e.code === 'KeyA') { const t = document.getElementById('admin-trigger'); t.style.display = t.style.display === 'none' ? 'flex' : 'none'; } });
    </script>
</body>
</html>
